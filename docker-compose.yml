version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gtm-signal-db
    environment:
      POSTGRES_USER: gtm_user
      POSTGRES_PASSWORD: gtm_password
      POSTGRES_DB: gtm_signal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gtm_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: gtm-signal-backend
    environment:
      DATABASE_URL: postgresql://gtm_user:gtm_password@postgres:5432/gtm_signal_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      FLASK_ENV: development
      SECRET_KEY: dev-secret-key
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m flask --app src.backend.app run --host=0.0.0.0

  frontend:
    image: node:18-alpine
    container_name: gtm-signal-frontend
    working_dir: /app/src/frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
